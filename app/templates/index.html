<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Insurance Claim Assessor</title>
  <style>
    :root {
      --bg:#0f172a; --card:#1e293b; --card2:#0f1b2e; --accent:#38bdf8;
      --text:#e2e8f0; --muted:#94a3b8; --line:#334155;
      --green:#22c55e; --amber:#f59e0b; --red:#ef4444;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text); margin: 0;
      min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px;
    }
    .card {
      background: var(--card); border-radius: 16px; padding: 28px;
      width: 100%; max-width: 620px; box-shadow: 0 10px 40px rgba(0,0,0,.4);
    }
    h1 { margin: 0 0 4px; font-size: 22px; }
    p.sub { margin: 0 0 22px; color: var(--muted); font-size: 14px; }
    label { display: block; font-size: 13px; margin-bottom: 6px; color: #cbd5e1; }
    input[type=file], textarea {
      width: 100%; background: var(--card2); border: 1px solid var(--line);
      border-radius: 8px; padding: 10px; color: var(--text); font-size: 14px; margin-bottom: 16px;
    }
    textarea { resize: vertical; min-height: 54px; font-family: inherit; }
    button {
      background: var(--accent); color: #082f49; border: none; border-radius: 8px;
      padding: 12px 20px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    #preview { max-width: 100%; border-radius: 8px; margin-bottom: 16px; display: none; }
    #result { margin-top: 22px; display: none; }
    .badge {
      display: inline-block; padding: 6px 14px; border-radius: 999px;
      font-weight: 800; font-size: 15px; letter-spacing: .5px;
    }
    .APPROVE { background: rgba(34,197,94,.15); color: var(--green); border:1px solid var(--green); }
    .MANUAL_REVIEW { background: rgba(245,158,11,.15); color: var(--amber); border:1px solid var(--amber); }
    .REJECT { background: rgba(239,68,68,.15); color: var(--red); border:1px solid var(--red); }
    .payout { font-size: 26px; font-weight: 800; margin: 14px 0 4px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
    .kv { background: var(--card2); border:1px solid var(--line); border-radius: 8px; padding: 10px 12px; }
    .kv .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing:.5px; }
    .kv .v { font-size: 15px; margin-top: 2px; }
    .summary { background: var(--card2); border-radius: 8px; padding: 14px; font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
    .chips { margin: 14px 0 4px; display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { background:#0b2a3a; border:1px solid var(--accent); color:#7dd3fc; border-radius:999px; padding:4px 10px; font-size:12px; }
    .section-title { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin:18px 0 6px; }
    .error { color: var(--red); }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚗 AI Insurance Claim Assessor</h1>
    <p class="sub">Upload a damage photo — an AI agent (AWS Bedrock) inspects it, applies policy rules, and returns an approve/reject decision. Traced end-to-end in Datadog.</p>

    <form id="form">
      <label for="image">Damage photo (JPEG, PNG, WebP · max 5 MB)</label>
      <input type="file" id="image" name="image" accept="image/*" required />
      <img id="preview" alt="preview" />

      <label for="prompt">Claim context (optional)</label>
      <textarea id="prompt" name="prompt">Assess this vehicle damage photo for an insurance reimbursement claim.</textarea>

      <button type="submit" id="submit">Assess Claim</button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const fileInput = document.getElementById('image');
    const preview = document.getElementById('preview');
    const result = document.getElementById('result');
    const submit = document.getElementById('submit');

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) { preview.src = URL.createObjectURL(file); preview.style.display = 'block'; }
    });

    function esc(s) { return String(s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    function render(json) {
      const d = json.decision;
      let html = '';
      if (d) {
        const label = (d.decision || '').replace('_', ' ');
        html += `<span class="badge ${esc(d.decision)}">${esc(label)}</span>`;
        html += `<div class="payout">Payout: $${esc(d.approved_payout_usd)}</div>`;
        html += `<div class="grid">
          <div class="kv"><div class="k">Damage</div><div class="v">${esc(d.damage_type)}</div></div>
          <div class="kv"><div class="k">Severity</div><div class="v">${esc(d.severity)}</div></div>
          <div class="kv"><div class="k">Est. repair</div><div class="v">$${esc(d.estimated_cost_usd)}</div></div>
          <div class="kv"><div class="k">Deductible</div><div class="v">$${esc(d.deductible_usd)}</div></div>
        </div>`;
        html += `<div class="section-title">Rationale</div><div class="summary">${esc(d.rationale)}</div>`;
      }
      html += `<div class="section-title">Assessor summary</div><div class="summary">${esc(json.answer)}</div>`;
      if (json.tool_calls && json.tool_calls.length) {
        html += `<div class="section-title">Agent tool calls (traced in Datadog)</div><div class="chips">`;
        html += json.tool_calls.map(t => `<span class="chip">🔧 ${esc(t.tool)}</span>`).join('');
        html += `</div>`;
      }
      if (json.model) html += `<div class="section-title">Model</div><div class="summary">${esc(json.model)}</div>`;
      result.innerHTML = html;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      result.style.display = 'none';
      submit.disabled = true; submit.textContent = 'Assessing…';

      const data = new FormData();
      data.append('image', fileInput.files[0]);
      data.append('prompt', document.getElementById('prompt').value);

      try {
        const res = await fetch('/agent', { method: 'POST', body: data });
        const json = await res.json();
        if (!res.ok) throw new Error(json.detail || 'Request failed');
        render(json);
      } catch (err) {
        result.innerHTML = `<div class="summary error">${esc(err.message)}</div>`;
      } finally {
        result.style.display = 'block';
        submit.disabled = false; submit.textContent = 'Assess Claim';
      }
    });
  </script>
</body>
</html>
