<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Analysis · Bedrock</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#e2e8f0; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text); margin: 0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: var(--card); border-radius: 16px; padding: 32px;
      width: 100%; max-width: 560px; box-shadow: 0 10px 40px rgba(0,0,0,.4);
    }
    h1 { margin: 0 0 4px; font-size: 22px; }
    p.sub { margin: 0 0 24px; color: #94a3b8; font-size: 14px; }
    label { display: block; font-size: 13px; margin-bottom: 6px; color: #cbd5e1; }
    input[type=file], textarea {
      width: 100%; background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; padding: 10px; color: var(--text); font-size: 14px; margin-bottom: 16px;
    }
    textarea { resize: vertical; min-height: 60px; font-family: inherit; }
    button {
      background: var(--accent); color: #082f49; border: none; border-radius: 8px;
      padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    #preview { max-width: 100%; border-radius: 8px; margin-bottom: 16px; display: none; }
    #result {
      margin-top: 20px; background: #0f172a; border-radius: 8px; padding: 16px;
      white-space: pre-wrap; font-size: 14px; line-height: 1.5; display: none;
    }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Image Analysis</h1>
    <p class="sub">Powered by AWS Bedrock (Claude vision)</p>

    <form id="form">
      <label for="image">Image (JPEG, PNG, GIF, WebP · max 5 MB)</label>
      <input type="file" id="image" name="image" accept="image/*" required />
      <img id="preview" alt="preview" />

      <label for="prompt">Prompt</label>
      <textarea id="prompt" name="prompt">Describe this image in detail.</textarea>

      <button type="submit" id="submit">Analyze</button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const fileInput = document.getElementById('image');
    const preview = document.getElementById('preview');
    const result = document.getElementById('result');
    const submit = document.getElementById('submit');

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      result.style.display = 'none';
      result.classList.remove('error');
      submit.disabled = true;
      submit.textContent = 'Analyzing…';

      const data = new FormData();
      data.append('image', fileInput.files[0]);
      data.append('prompt', document.getElementById('prompt').value);

      try {
        const res = await fetch('/analyze', { method: 'POST', body: data });
        const json = await res.json();
        if (!res.ok) throw new Error(json.detail || 'Request failed');
        result.textContent = json.analysis;
      } catch (err) {
        result.textContent = err.message;
        result.classList.add('error');
      } finally {
        result.style.display = 'block';
        submit.disabled = false;
        submit.textContent = 'Analyze';
      }
    });
  </script>
</body>
</html>
